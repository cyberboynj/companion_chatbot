<!DOCTYPE html>
<html>
<head>
  <title>E-Companion Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">

    <section id="persona-screen">
      <div class="selection-header">
        <h1>Choose Your Companion</h1>

        <button id="theme-toggle-home" type="button">
          🌙 Dark
        </button>
      </div>

      <div class="persona-grid">
        <button class="persona-card mia-card" data-persona="Mia">
          <img class="persona-avatar" src="images/mia.png" alt="Mia avatar">
          <h2>Mia</h2>
          <p>Warm, playful, supportive</p>
        </button>

        <button class="persona-card leo-card" data-persona="Leo">
          <img class="persona-avatar" src="images/leo.png" alt="Leo avatar">
          <h2>Leo</h2>
          <p>Confident, funny, encouraging</p>
        </button>

        <button class="persona-card sage-card" data-persona="Sage">
          <img class="persona-avatar" src="images/sage.png" alt="Sage avatar">
          <h2>Sage</h2>
          <p>Calm, thoughtful, wise</p>
        </button>

        <button class="persona-card arlo-card" data-persona="Arlo">
          <img class="persona-avatar" src="images/arlo.png" alt="Arlo avatar">
          <h2>Arlo</h2>
          <p>Cozy, creative, gentle</p>
        </button>
      </div>
    </section>

    <section id="chat-screen" class="hidden">
      <div class="chat-topbar">
        <button id="back" type="button">← Change</button>
        <button id="theme-toggle" type="button">🌙 Dark</button>
      </div>

      <div class="companion-hero">
        <div class="hero-avatar-container">
          <img id="hero-avatar" src="images/mia.png" alt="Companion avatar">
        </div>

        <h1 id="chat-title">Mia</h1>
        <p id="mood-label">Mood: Listening</p>
        <p id="status-label">Status: Online</p>
        <p id="profile-description"></p>

        <div id="profile-card">
          <p id="profile-stats"></p>
        </div>
      </div>

      <div id="memory-panel">
        <div class="memory-header">
          <button id="toggle-memory" type="button">🧠 Show Memories</button>
          <button id="clear-memories" type="button">Clear</button>
        </div>

        <div id="memory-list" class="hidden">
          <p class="memory-empty">No memories saved yet.</p>
        </div>
      </div>

      <div id="chat"></div>

      <div class="chips">
        <button>How was your day?</button>
        <button>I need advice</button>
        <button>Cheer me up</button>
        <button>I feel stressed</button>
      </div>

      <form id="form">
        <input id="message" placeholder="Type a message..." autocomplete="off">
        <button>Send</button>
        <button id="clear" type="button">Clear Chat</button>
      </form>
    </section>

  </main>

  <div id="toast" class="hidden"></div>

  <script src="app.js"></script>
</body>
</html>
